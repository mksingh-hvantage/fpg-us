name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            REPO_DIR="/var/www/html/thefutureperfectglobal-us"

            # Pull latest code
            cd $REPO_DIR
            git pull origin main

            # --- Backend ---
            cd $REPO_DIR/backend
            npm install --production
            npx prisma generate
            pm2 restart fpg-us-backend

            # --- Frontend ---
            cd $REPO_DIR/frontend
            npm install
            npm run build
