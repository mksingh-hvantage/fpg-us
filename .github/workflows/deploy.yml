name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Setup server (Node.js, PM2)
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'SETUP'
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt install -y nodejs
            fi
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            sudo env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu || true
            sudo mkdir -p /var/www/html/thefutureperfectglobal-us/backend
            sudo chown -R ubuntu:ubuntu /var/www/html/thefutureperfectglobal-us
          SETUP

      - name: Sync backend files to server
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude 'uploads/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./backend/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/html/thefutureperfectglobal-us/backend/

      - name: Install dependencies and generate Prisma client
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /var/www/html/thefutureperfectglobal-us/backend
            npm install --production
            npx prisma generate
          EOF

      - name: Restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /var/www/html/thefutureperfectglobal-us/backend
            if pm2 list | grep -q "fpg-us-backend"; then
              pm2 restart fpg-us-backend
            else
              pm2 start "npx tsx src/index.ts" --name "fpg-us-backend"
            fi
            pm2 save
          EOF

      - name: Verify backend deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "pm2 status"
          echo "Backend deployed successfully!"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Build React app
        run: cd frontend && npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo mkdir -p /var/www/html/thefutureperfectglobal-us/frontend/dist && sudo chown -R ubuntu:ubuntu /var/www/html/thefutureperfectglobal-us/frontend"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./frontend/dist/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/html/thefutureperfectglobal-us/frontend/dist/

      - name: Verify frontend deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "ls -la /var/www/html/thefutureperfectglobal-us/frontend/dist/ | head -10"
          echo "Frontend deployed successfully!"
